{% extends 'base.html' %}
{% block content %}
<h2>Estoque</h2>
<div class="grid two">
  <section class="card">
    <form method="post" class="form-grid">
      <input name="item_name" placeholder="Item" required>
      <input name="unit" placeholder="Unidade (kg, un, L)" required>
      <input name="quantity" type="number" step="0.01" placeholder="Quantidade atual" required>
      <input name="min_level" type="number" step="0.01" placeholder="Estoque mínimo" required>
      <button type="submit">Salvar item</button>
    </form>
  </section>
  <section class="card">
    <table>
      <tr><th>Item</th><th>Qtd</th><th>Mínimo</th><th>Status</th></tr>
      {% for i in items %}
      <tr>
        <td>{{ i.item_name }}</td>
        <td>{{ i.quantity }} {{ i.unit }}</td>
        <td>{{ i.min_level }} {{ i.unit }}</td>
        <td>{% if i.quantity <= i.min_level %}<span class="danger">Repor</span>{% else %}Ok{% endif %}</td>
      </tr>
      {% else %}
      <tr><td colspan="4">Sem itens.</td></tr>
      {% endfor %}
    </table>
  </section>
</div>
{% endblock %}
