{% extends 'base.html' %}
{% block content %}
<h2>Agenda de encomendas</h2>
<div class="grid two">
  <section class="card">
    <form method="post" class="form-grid">
      <input name="customer_name" placeholder="Cliente" required>
      <input name="product_name" placeholder="Produto" required>
      <input name="quantity" type="number" step="0.01" placeholder="Quantidade" required>
      <input name="due_date" type="date" required>
      <select name="status">
        <option>Pendente</option><option>Em produção</option><option>Entregue</option>
      </select>
      <textarea name="notes" placeholder="Observações"></textarea>
      <button type="submit">Salvar encomenda</button>
    </form>
  </section>
  <section class="card">
    <table>
      <tr><th>Data</th><th>Cliente</th><th>Produto</th><th>Qtd</th><th>Status</th></tr>
      {% for o in orders %}
      <tr><td>{{ o.due_date }}</td><td>{{ o.customer_name }}</td><td>{{ o.product_name }}</td><td>{{ o.quantity }}</td><td>{{ o.status }}</td></tr>
      {% else %}
      <tr><td colspan="5">Sem encomendas.</td></tr>
      {% endfor %}
    </table>
  </section>
</div>
{% endblock %}
