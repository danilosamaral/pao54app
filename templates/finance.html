{% extends 'base.html' %}
{% block content %}
<h2>Financeiro</h2>
<div class="grid two">
  <section class="card">
    <form method="post" class="form-grid">
      <select name="type"><option value="entrada">Entrada</option><option value="saida">Saída</option></select>
      <input name="category" placeholder="Categoria" required>
      <input name="description" placeholder="Descrição">
      <input name="amount" type="number" step="0.01" placeholder="Valor" required>
      <input name="date" type="date" required>
      <button type="submit">Registrar</button>
    </form>
  </section>
  <section class="card">
    <table>
      <tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Valor</th></tr>
      {% for e in entries %}
      <tr><td>{{ e.date }}</td><td>{{ e.type }}</td><td>{{ e.category }}</td><td>{{ e.description }}</td><td>R$ {{ '%.2f'|format(e.amount) }}</td></tr>
      {% else %}
      <tr><td colspan="5">Sem lançamentos.</td></tr>
      {% endfor %}
    </table>
  </section>
</div>
{% endblock %}
